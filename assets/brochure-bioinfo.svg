  <text x="270" y="104" text-anchor="middle" fill="white" font-size="8">RNA</text>
  <text x="100" y="174" text-anchor="middle" fill="white" font-size="8">蛋白</text>
  <text x="300" y="174" text-anchor="middle" fill="white" font-size="8">代谢</text>
  <text x="150" y="204" text-anchor="middle" fill="white" font-size="8">16S</text>
  <text x="250" y="204" text-anchor="middle" fill="white" font-size="8">ncRNA</text>
  <text x="200" y="260" text-anchor="middle" fill="white" font-size="24" font-weight="bold">BIOINFO</text>
  <text x="200" y="282" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11" letter-spacing="3">生物信息学分析</text>
