  <line x1="200" y1="130" x2="100" y2="170" stroke="rgba(166,200,30,0.5)" stroke-width="1.5"/>
  <line x1="200" y1="130" x2="300" y2="170" stroke="rgba(166,200,30,0.5)" stroke-width="1.5"/>
  <line x1="200" y1="130" x2="150" y2="200" stroke="rgba(166,200,30,0.5)" stroke-width="1.5"/>
  <line x1="200" y1="130" x2="250" y2="200" stroke="rgba(166,200,30,0.5)" stroke-width="1.5"/>
  <line x1="100" y1="170" x2="150" y2="200" stroke="rgba(72,202,228,0.3)" stroke-width="1"/>
  <line x1="300" y1="170" x2="250" y2="200" stroke="rgba(72,202,228,0.3)" stroke-width="1"/>
