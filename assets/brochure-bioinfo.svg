<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B263B"/>
      <stop offset="50%" style="stop-color:#2d4a1e"/>
      <stop offset="100%" style="stop-color:#a6c81e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="20" fill="url(#bg3)"/>
  <!-- Bioinfo network nodes -->
  <circle cx="200" cy="130" r="25" fill="rgba(166,200,30,0.3)" stroke="#a6c81e" stroke-width="2"/>
  <circle cx="130" cy="100" r="15" fill="rgba(0,150,199,0.3)" stroke="#48CAE4" stroke-width="1.5"/>
  <circle cx="270" cy="100" r="15" fill="rgba(0,150,199,0.3)" stroke="#48CAE4" stroke-width="1.5"/>
  <circle cx="100" cy="170" r="15" fill="rgba(72,202,228,0.3)" stroke="#48CAE4" stroke-width="1.5"/>
  <circle cx="300" cy="170" r="15" fill="rgba(72,202,228,0.3)" stroke="#48CAE4" stroke-width="1.5"/>
  <circle cx="150" cy="200" r="15" fill="rgba(72,202,228,0.3)" stroke="#48CAE4" stroke-width="1.5"/>
  <circle cx="250" cy="200" r="15" fill="rgba(72,202,228,0.3)" stroke="#48CAE4" stroke-width="1.5"/>
  <!-- Connecting lines -->
  <line x1="200" y1="130" x2="130" y2="100" stroke="rgba(166,200,30,0.5)" stroke-width="1.5"/>
